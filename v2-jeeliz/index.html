<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Virtual Try-On Demo — v2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
  <script src="./lib/JeelizVTOWidget.js"></script>
  <!-- lib/JeelizVTOWidget.css intentionally NOT loaded: it's demo-page styling
       (full-width notice, bottom:0) that breaks this layout. The widget itself
       only relies on its self-injected _jeelizVTOForceHide/Show classes. -->

  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0b0b0f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    .brand {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: 12px 16px; text-align: center; color: #fff;
      background: linear-gradient(rgba(0,0,0,.55), transparent);
      pointer-events: none;
    }
    .brand h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
    .brand p { margin: 2px 0 0; font-size: 12px; opacity: .75; }

    /* widget fills screen */
    #JeelizVTOWidget { position: fixed; inset: 0; z-index: 1; }
    #JeelizVTOWidgetCanvas { position: absolute; width: 100%; height: 100%; }

    .tray {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
      display: flex; flex-wrap: nowrap; gap: 10px;
      overflow-x: auto; -webkit-overflow-scrolling: touch;
      scroll-snap-type: x proximity;
      padding: 12px 14px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(transparent, rgba(0,0,0,.7));
    }
    .tray::-webkit-scrollbar { height: 4px; }
    .tray::-webkit-scrollbar-thumb { background: rgba(255,255,255,.35); border-radius: 2px; }
    .tray::-webkit-scrollbar-track { background: rgba(255,255,255,.08); }
    .tray button {
      flex: 0 0 auto; width: 76px; padding: 4px 4px 5px; scroll-snap-align: center;
      border-radius: 12px; border: 2px solid rgba(255,255,255,.35);
      background: rgba(20,20,20,.6); color: #fff; cursor: pointer;
      transition: border-color .15s, transform .15s;
    }
    .tray button img {
      display: block; width: 100%; height: 42px; object-fit: cover;
      border-radius: 8px; background: #222; pointer-events: none;
    }
    .tray button span {
      display: block; margin-top: 3px; font-size: 9px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tray button.selected { border-color: #4ade80; transform: scale(1.05); }

    #adjust-btn {
      position: fixed; top: 60px; right: 12px; z-index: 10;
      padding: 8px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,.35);
      background: rgba(20,20,20,.55); color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; backdrop-filter: blur(6px);
    }

    /* Compact notice card. pointer-events none so drags pass through to the
       canvas; only the Done button is clickable. z above tray. */
    #JeelizVTOWidgetAdjustNotice {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 20;
      width: auto; max-width: 260px; padding: 12px 16px; border-radius: 12px;
      background: rgba(15,15,20,.85); color: #fff; font-size: 13px;
      text-align: center; display: none; pointer-events: none;
    }
    #JeelizVTOWidgetAdjustExit {
      display: block; margin: 8px auto 0; padding: 6px 16px; border-radius: 10px;
      border: 1px solid #4ade80; background: rgba(74,222,128,.25);
      color: #fff; font-size: 12px; font-weight: 600; cursor: pointer;
      position: static; pointer-events: auto;
    }
    /* While adjusting: clear the stage so the canvas gets every pointer event */
    body.adjusting .tray, body.adjusting #adjust-btn { display: none; }

    #JeelizVTOWidgetLoading {
      position: fixed; inset: 0; z-index: 12; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 14px;
      background: #0b0b0f; color: #fff;
    }
    .spin {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,.2); border-top-color: #4ade80;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .JeelizVTOWidgetLoadingText { font-size: 14px; opacity: .8; }
  </style>

  <script>
    const MODELS = [
      { sku: "rayban_aviator_or_vertFlash", label: "Aviator" },
      { sku: "rayban_wayfarer_havane_vert", label: "Wayfarer" },
      { sku: "rayban_clubmaster_noir_bleuGris", label: "Clubmaster" },
      { sku: "rayban_round_cuivre_pinkBrownDegrade", label: "Round" },
      { sku: "rayban_wayfarer_denimOrange_orangeDegrade", label: "Wayfarer Orange" },
      { sku: "rayban_round_or_vert", label: "Round Gold" },
      { sku: "rayban_justin_noir_bleuMirroir", label: "Justin Blue" },
      { sku: "rayban_clubround_noir_vertClassique_g15", label: "Clubround" },
      { sku: "rayban_erika_marronArgent_marronVioletDegrade", label: "Erika" },
      { sku: "rayban_cockpit_or_vert_classique", label: "Cockpit" },
      { sku: "rayban_predator_noir_gris_mirroir", label: "Predator" },
      { sku: "rayban_boyfriend_noir_marron_degrade", label: "Boyfriend" },
      { sku: "rayban_new_wayfarer_havane_marron_clair_degrade", label: "New Wayfarer" },
      { sku: "rayban_chris_gris_argent_argent_mirroir", label: "Chris Silver" },
    ];
    let currentSku = MODELS[0].sku;

    function select_model(sku) {
      currentSku = sku;
      JEELIZVTOWIDGET.load(sku);
      document.querySelectorAll(".tray button").forEach((b) =>
        b.classList.toggle("selected", b.dataset.sku === sku));
    }

    function enter_adjust() {
      document.body.classList.add("adjusting");
      JEELIZVTOWIDGET.enter_adjustMode();
    }

    function main() {
      // Done button: exit adjust mode and restore UI (widget may or may not
      // bind its own handler — exit_adjustMode is safe to call redundantly)
      document.getElementById("JeelizVTOWidgetAdjustExit").addEventListener("click", () => {
        JEELIZVTOWIDGET.exit_adjustMode();
        document.body.classList.remove("adjusting");
      });

      const tray = document.getElementById("tray");
      MODELS.forEach(({ sku, label }) => {
        const b = document.createElement("button");
        b.id = "btn-" + label.toLowerCase().replace(/\s+/g, "-");
        b.dataset.sku = sku;
        const img = document.createElement("img");
        img.src = "./thumbs/" + sku + ".png";
        img.alt = label;
        const span = document.createElement("span");
        span.textContent = label;
        b.appendChild(img);
        b.appendChild(span);
        b.addEventListener("click", () => select_model(sku));
        tray.appendChild(b);
      });

      JEELIZVTOWIDGET.start({
        sku: currentSku,
        searchImageMask: "https://appstatic.jeeliz.com/jeewidget/images/target512.jpg",
        searchImageColor: 0x0b0b0f,
        callbackReady: () => {
          document.querySelector('.tray button[data-sku="' + currentSku + '"]').classList.add("selected");
          console.log("JEELIZVTOWIDGET ready");
        },
        onError: (errorLabel) => {
          document.getElementById("JeelizVTOWidgetLoading").innerHTML =
            '<div class="JeelizVTOWidgetLoadingText">Error: ' + errorLabel +
            "<br/>Camera required — allow access and reload.</div>";
          document.getElementById("JeelizVTOWidgetLoading").style.display = "flex";
        },
      });
    }
    window.addEventListener("load", main);
  </script>
</head>

<body>
  <div class="brand">
    <h1>Virtual Try-On</h1>
    <p>WebAR demo v2 &mdash; Jeeliz engine</p>
  </div>

  <div id="JeelizVTOWidget">
    <canvas id="JeelizVTOWidgetCanvas"></canvas>

    <button id="JeelizVTOWidgetAdjust" style="display:none"></button>
    <button id="adjust-btn" onclick="enter_adjust()">&#10021; Adjust</button>

    <div id="JeelizVTOWidgetAdjustNotice">
      Drag the glasses to adjust position.
      <button id="JeelizVTOWidgetAdjustExit">Done</button>
    </div>

    <div id="JeelizVTOWidgetLoading">
      <div class="spin"></div>
      <div class="JeelizVTOWidgetLoadingText">Loading engine&hellip;</div>
    </div>
  </div>

  <div class="tray" id="tray"></div>
</body>
</html>
